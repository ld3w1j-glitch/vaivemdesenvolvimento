{% extends "base.html" %}
{% block content %}
<h1>Entregadores</h1>
<form class="form-grid card" method="post" enctype="multipart/form-data">
  <label>Nome</label><input name="nome" required>
  <label>Email</label><input name="email" type="email" required>
  <label>Senha inicial</label><input name="senha" placeholder="123456">
  <label>Telefone</label><input name="telefone">
  <label>Veículo</label><input name="veiculo" required>
  <label>Capacidade kg</label><input name="capacidade_kg" type="number" step="0.01" value="20">
  <label>Foto</label><input name="foto" type="file">
  <button class="btn primary" type="submit">Criar</button>
</form>
<div class="grid two">
{% for e in entregadores %}
<div class="card"><h3>{{ e.usuario.nome }}</h3><p>{{ e.veiculo }} · {{ e.capacidade_kg }} kg</p></div>
{% endfor %}
</div>
{% endblock %}
