{% extends "base.html" %}
{% block content %}
<style>
  #mapa-mercado {
    width: 100%;
    height: 380px;
    border-radius: 18px;
    border: 1px solid #dce7df;
    overflow: hidden;
    margin: 12px 0;
  }

  .map-help {
    background: #e8f5ec;
    border: 1px solid #9bd8b5;
    color: #126b37;
    border-radius: 14px;
    padding: 12px;
    margin: 10px 0;
    font-weight: 700;
  }

  .image-fields,
  .color-fields {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .color-fields input[type="color"] {
    height: 48px;
    padding: 4px;
  }

  .marker-preview {
    width: 34px;
    height: 34px;
    border-radius: 50% 50% 50% 0;
    transform: rotate(-45deg);
    border: 3px solid #ffffff;
    box-shadow: 0 3px 12px rgba(0,0,0,.25);
    margin: 10px 0 0 8px;
    background: #1f8a4c;
  }

  @media (max-width: 800px) {
    .image-fields,
    .color-fields {
      grid-template-columns: 1fr;
    }
  }
</style>

<div class="page-head">
  <div>
    <h1>Novo mercado</h1>
    <p>Cadastre o mercado, localização, imagens e cores.</p>
  </div>

  <a class="btn" href="{{ url_for('admin.mercados') }}">Voltar</a>
</div>

<form class="form-grid card" method="post" enctype="multipart/form-data">
  <label>Nome</label>
  <input name="nome" required>

  <label>Endereço</label>
  <input name="endereco" required>

  <div class="map-help">
    Clique no mapa para colocar a localização do mercado. Você também pode arrastar o marcador.
  </div>

  <div id="mapa-mercado"></div>

  <label>Latitude</label>
  <input id="latitude" name="latitude" value="-22.228" required>

  <label>Longitude</label>
  <input id="longitude" name="longitude" value="-45.936" required>

  <label>Telefone</label>
  <input name="telefone">

  <label>Horário</label>
  <input name="horario">

  <h3>Cores do mercado</h3>

  <div class="color-fields">
    <div>
      <label>Cor principal do mercado</label>
      <input id="cor_primaria" name="cor_primaria" type="color" value="#1f8a4c">
    </div>

    <div>
      <label>Cor secundária / fundo</label>
      <input id="cor_secundaria" name="cor_secundaria" type="color" value="#e8f5ec">
    </div>

    <div>
      <label>Cor do ponteiro no mapa</label>
      <input id="cor_ponteiro" name="cor_ponteiro" type="color" value="#1f8a4c">
      <div id="marker-preview" class="marker-preview"></div>
    </div>
  </div>

  <h3>Imagens do mercado</h3>

  <div class="image-fields">
    <div>
      <label>Foto do perfil do mercado</label>
      <input name="foto_perfil" type="file" accept="image/*">
    </div>

    <div>
      <label>Foto de apresentação do mercado</label>
      <input name="foto_apresentacao" type="file" accept="image/*">
    </div>
  </div>

  <label>Logo antigo / opcional</label>
  <input name="logo" type="file" accept="image/*">

  <button class="btn primary" type="submit">Salvar mercado</button>
</form>

<script>
document.addEventListener("DOMContentLoaded", function () {
  const latInput = document.getElementById("latitude");
  const lngInput = document.getElementById("longitude");
  const corPonteiroInput = document.getElementById("cor_ponteiro");
  const markerPreview = document.getElementById("marker-preview");

  const latInicial = parseFloat(latInput.value || "-22.228");
  const lngInicial = parseFloat(lngInput.value || "-45.936");

  const map = L.map("mapa-mercado").setView([latInicial, lngInicial], 14);

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: "&copy; OpenStreetMap"
  }).addTo(map);

  let marker = L.marker([latInicial, lngInicial], {
    draggable: true
  }).addTo(map);

  function atualizarCampos(latlng) {
    latInput.value = latlng.lat.toFixed(6);
    lngInput.value = latlng.lng.toFixed(6);
  }

  function atualizarPreviewPonteiro() {
    markerPreview.style.background = corPonteiroInput.value;
  }

  map.on("click", function (e) {
    marker.setLatLng(e.latlng);
    atualizarCampos(e.latlng);
  });

  marker.on("dragend", function () {
    atualizarCampos(marker.getLatLng());
  });

  corPonteiroInput.addEventListener("input", atualizarPreviewPonteiro);
  atualizarPreviewPonteiro();
});
</script>
{% endblock %}
