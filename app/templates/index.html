{% extends "base.html" %}
{% block content %}
<section class="public-hero illustrated-public-hero">
  <div>
    <span class="eyebrow">Entrega local com carinho</span>
    <h1>Mercados do bairro, comparação de preços e entrega local.</h1>
    <p>Cliente compra, sistema compara, entregador aceita e finaliza com código. Tudo em uma experiência simples, visual e fácil de usar.</p>
    <div class="actions">
      <a class="btn primary" href="{{ url_for('auth.login') }}">Entrar</a>
      <a class="btn" href="{{ url_for('auth.cadastro') }}">Criar conta</a>
    </div>
  </div>
  <img class="public-hero-mascot" src="{{ url_for('static', filename='img/mascotes/sacola-vaivem.png') }}" alt="VaiVem Mercado">
</section>

{% endblock %}
